version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: shoppingcart-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopping_cart_localization
      MYSQL_USER: db_user
      MYSQL_PASSWORD: db_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: shoppingcart-app
    depends_on:
      - db
    environment:
      DB_URL: jdbc:mariadb://db:3306/shopping_cart_localization?allowPublicKeyRetrieval=true&useSSL=false
      DB_USER: db_user
      DB_PASSWORD: db_password
    platform: linux/amd64
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  db_data: